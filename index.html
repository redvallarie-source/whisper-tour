    <style>
        /* Premium Design - Inspiration: Tzu Chi Green + Modern Minimalist */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        :root {
            --tcu-green: #007A53;
            --tcu-dark: #00563B;
            --tcu-light: #E8F5E9;
            --danger: #FF4B4B;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            text-align: center; 
            background: linear-gradient(135deg, #e0ebd4 0%, #b2d2a4 100%);
            min-height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box;
        }
        
        .container { 
            width: 100%; max-width: 400px; background: rgba(255, 255, 255, 0.95); 
            padding: 40px 30px; border-radius: 28px; 
            box-shadow: 0 20px 40px rgba(0, 122, 83, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5);
        }

        /* Typography */
        h1 { color: var(--tcu-dark); font-size: 26px; margin-bottom: 5px; font-weight: 700; letter-spacing: -0.5px;}
        .subtitle { color: #666; font-size: 14px; margin-bottom: 30px; font-weight: 400; }
        
        /* Input & Form */
        input { 
            padding: 16px; width: 100%; box-sizing: border-box; border-radius: 14px; 
            font-size: 18px; border: 2px solid #ddd; text-align: center; 
            font-weight: 600; color: #333; margin-bottom: 20px; font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }
        input:focus { outline: none; border-color: var(--tcu-green); box-shadow: 0 0 0 4px var(--tcu-light); }
        
        /* Buttons */
        button { 
            padding: 16px; width: 100%; border-radius: 14px; font-size: 16px; 
            font-weight: 600; cursor: pointer; border: none; margin-bottom: 12px;
            transition: all 0.2s ease; font-family: 'Poppins', sans-serif;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        button:active { transform: scale(0.97); }
        
        .btn-primary { 
            background: linear-gradient(135deg, var(--tcu-green) 0%, var(--tcu-dark) 100%); 
            color: white; box-shadow: 0 8px 20px rgba(0, 122, 83, 0.25); 
        }
        .btn-primary:hover { box-shadow: 0 8px 20px rgba(0, 122, 83, 0.4); transform: translateY(-2px); }
        
        .btn-secondary { background-color: #f0f4f1; color: var(--tcu-dark); font-weight: 500; }
        .btn-secondary:hover { background-color: #e2e8e4; }

        .btn-danger { 
            background: rgba(255, 75, 75, 0.1); color: var(--danger); 
            border: 2px solid rgba(255, 75, 75, 0.2); margin-top: 25px; 
        }
        .btn-danger:hover { background: var(--danger); color: white; border-color: var(--danger); }

        /* Dynamic Areas */
        .hidden { display: none !important; }
        #status-card {
            background: var(--tcu-light); padding: 20px; border-radius: 16px;
            margin-top: 15px; border: 1px dashed var(--tcu-green);
        }
        #status-text { font-size: 15px; font-weight: 500; color: var(--tcu-dark); line-height: 1.5; }
        
        /* QR Code & Animation */
        #qrcode { 
            margin-top: 20px; display: flex; justify-content: center; 
            padding: 20px; background: #fff; border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eee;
        }
        .listening-animation {
            width: 60px; height: 60px; background: var(--tcu-green); border-radius: 50%;
            margin: 30px auto 10px; animation: pulse-green 1.5s infinite;
            display: flex; align-items: center; justify-content: center; color: white; font-size: 24px;
        }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(0, 122, 83, 0.5); }
            70% { box-shadow: 0 0 0 25px rgba(0, 122, 83, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 122, 83, 0); }
        }
    </style>
</head>
