<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper Tour - Premium Audio Guide</title>
    
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.9.0/jsrsasign-all-min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        /* Desain Premium - Inspirasi: Tzu Chi Green + Modern Minimalist */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        :root {
            --tcu-green: #007A53;
            --tcu-dark: #00563B;
            --tcu-light: #E8F5E9;
            --danger: #FF4B4B;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            text-align: center; 
            background: linear-gradient(135deg, #e0ebd4 0%, #b2d2a4 100%);
            min-height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box;
        }
        
        .container { 
            width: 100%; max-width: 400px; background: rgba(255, 255, 255, 0.95); 
            padding: 40px 30px; border-radius: 28px; 
            box-shadow: 0 20px 40px rgba(0, 122, 83, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5);
        }

        /* Tipografi */
        h1 { color: var(--tcu-dark); font-size: 26px; margin-bottom: 5px; font-weight: 700; letter-spacing: -0.5px;}
        .subtitle { color: #666; font-size: 14px; margin-bottom: 30px; font-weight: 400; }
        
        /* Input & Form */
        input { 
            padding: 16px; width: 100%; box-sizing: border-box; border-radius: 14px; 
            font-size: 18px; border: 2px solid #ddd; text-align: center; 
            font-weight: 600; color: #333; margin-bottom: 20px; font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }
        input:focus { outline: none; border-color: var(--tcu-green); box-shadow: 0 0 0 4px var(--tcu-light); }
        
        /* Tombol-tombol */
        button { 
            padding: 16px; width: 100%; border-radius: 14px; font-size: 16px; 
            font-weight: 600; cursor: pointer; border: none; margin-bottom: 12px;
            transition: all 0.2s ease; font-family: 'Poppins', sans-serif;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        button:active { transform: scale(0.97); }
        
        .btn-primary { 
            background: linear-gradient(135deg, var(--tcu-green) 0%, var(--tcu-dark) 100%); 
            color: white; box-shadow: 0 8px 20px rgba(0, 122, 83, 0.25); 
        }
        .btn-primary:hover { box-shadow: 0 8px 20px rgba(0, 122, 83, 0.4); transform: translateY(-2px); }
        
        .btn-secondary { background-color: #f0f4f1; color: var(--tcu-dark); font-weight: 500; }
        .btn-secondary:hover { background-color: #e2e8e4; }

        .btn-danger { 
            background: rgba(255, 75, 75, 0.1); color: var(--danger); 
            border: 2px solid rgba(255, 75, 75, 0.2); margin-top: 25px; 
        }
        .btn-danger:hover { background: var(--danger); color: white; border-color: var(--danger); }

        /* Area Dinamis */
        .hidden { display: none !important; }
        #status-card {
            background: var(--tcu-light); padding: 20px; border-radius: 16px;
            margin-top: 15px; border: 1px dashed var(--tcu-green);
        }
        #status-text { font-size: 15px; font-weight: 500; color: var(--tcu-dark); line-height: 1.5; }
        
        /* QR Code & Animasi */
        #qrcode { 
            margin-top: 20px; display: flex; justify-content: center; 
            padding: 20px; background: #fff; border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eee;
        }
        .listening-animation {
            width: 60px; height: 60px; background: var(--tcu-green); border-radius: 50%;
            margin: 30px auto 10px; animation: pulse-green 1.5s infinite;
            display: flex; align-items: center; justify-content: center; color: white; font-size: 24px;
        }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(0, 122, 83, 0.5); }
            70% { box-shadow: 0 0 0 25px rgba(0, 122, 83, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 122, 83, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🍃 Whisper Tour</h1>
        <p class="subtitle" id="subtitle">Sistem Pemandu Audio Satu Arah</p>
        
        <div id="setup-area">
            <input type="text" id="roomName" placeholder="Masukkan ID Ruangan" value="1234">
            <button class="btn-primary" onclick="joinRoom('host')">🎙️ Buat Ruangan (Pemandu)</button>
            <button class="btn-secondary" onclick="joinRoom('listener')">🎧 Gabung Pendengar</button>
        </div>

        <div id="qr-landing-area" class="hidden">
            <div id="status-card" style="margin-bottom: 20px;">
                <p id="status-text">Kamu diundang ke Tour Ruangan <br><b style="font-size: 24px;" id="landing-room-id"></b></p>
            </div>
            <button class="btn-primary" onclick="joinRoom('listener')" style="padding: 20px; font-size: 18px;">
                ▶️ Masuk & Dengarkan
            </button>
        </div>

        <div id="active-area" class="hidden">
            <div id="status-card">
                <div id="status-text">⏳ Menghubungkan...</div>
            </div>
            
            <div id="qrcode" class="hidden"></div>
            <div id="visual-indicator" class="hidden"></div>
            
            <button id="btn-leave" class="btn-danger hidden" onclick="leaveRoom()">🚪 Keluar</button>
        </div>
    </div>

    <script>
        const LIVEKIT_URL = "wss://whisper-tour-app-yqygtof5.livekit.cloud";
        const API_KEY = "API5mBWCdaKNLLQ";
        const API_SECRET = "xfZhky6tUeDAYufb8ewdUZOy2vmaJXqOZpfDhpCybiGB";
        
        let currentRoom = null; // Menyimpan data ruangan agar bisa dimatikan nanti

        function generateToken(roomName, isHost) {
            const header = JSON.stringify({ alg: "HS256", typ: "JWT" });
            const payload = JSON.stringify({
                iss: API_KEY, sub: isHost ? "pemandu-" + Math.random() : "pengunjung-" + Math.random(),
                nbf: Math.floor(Date.now() / 1000), exp: Math.floor(Date.now() / 1000) + (3600 * 2), 
                video: { roomJoin: true, room: roomName, canPublish: isHost, canSubscribe: true }
            });
            return KJUR.jws.JWS.sign("HS256", header, payload, {utf8: API_SECRET});
        }

        async function joinRoom(role) {
            const roomName = document.getElementById('roomName').value;
            if (!roomName) return alert("ID ruangan tidak boleh kosong!");

            const isHost = role === 'host';
            
            // Atur perpindahan tampilan layar
            document.getElementById('setup-area').classList.add('hidden');
            document.getElementById('qr-landing-area').classList.add('hidden');
            document.getElementById('active-area').classList.remove('hidden');
            
            const statusText = document.getElementById('status-text');
            const qrBox = document.getElementById('qrcode');
            const visualBox = document.getElementById('visual-indicator');
            const btnLeave = document.getElementById('btn-leave');
            
            document.getElementById('subtitle').innerText = "Ruangan Aktif: " + roomName;
            statusText.innerHTML = "⏳ Menghubungkan ke server LiveKit...";

            try {
                const token = generateToken(roomName, isHost);
                currentRoom = new LivekitClient.Room();

                await currentRoom.connect(LIVEKIT_URL, token);

                if (isHost) {
                    statusText.innerHTML = "✅ <b>Kamu sedang LIVE!</b><br><span style='font-size:13px;'>Minta pengunjung scan QR Code di bawah:</span>";
                    await currentRoom.localParticipant.setMicrophoneEnabled(true);

                    const listenerLink = window.location.origin + window.location.pathname + "?room=" + roomName + "&role=listener&autoJoin=1";
                    qrBox.classList.remove('hidden');
                    qrBox.innerHTML = ""; 
                    new QRCode(qrBox, { text: listenerLink, width: 180, height: 180, colorDark : "#00563B", colorLight : "#ffffff" });
                    
                    btnLeave.innerHTML = "⏹️ Akhiri Tour";
                    btnLeave.classList.remove('hidden');

                } else {
                    statusText.innerHTML = "🎧 <b>Terhubung!</b><br><span style='font-size:13px;'>Suara pemandu akan otomatis diputar.</span>";
                    visualBox.classList.remove('hidden');
                    visualBox.innerHTML = "<div class='listening-animation'>🔊</div>";
                    
                    btnLeave.innerHTML = "🚪 Keluar Ruangan";
                    btnLeave.classList.remove('hidden');
                    
                    currentRoom.on('trackSubscribed', (track) => {
                        if (track.kind === 'audio') {
                            const audioElement = track.attach();
                            audioElement.play();
                            document.body.appendChild(audioElement);
                        }
                    });
                }
            } catch (error) {
                console.error(error);
                statusText.innerHTML = "❌ Gagal terhubung ke server!";
                setTimeout(() => leaveRoom(), 2000); // Otomatis kembali ke awal jika gagal
            }
        }

        // Fungsi Baru: Tombol Keluar / Akhiri Tour
        function leaveRoom() {
            if (currentRoom) {
                currentRoom.disconnect();
                currentRoom = null;
            }
            
            // Kembalikan semua tampilan ke kondisi semula
            document.getElementById('active-area').classList.add('hidden');
            document.getElementById('qrcode').classList.add('hidden');
            document.getElementById('visual-indicator').classList.add('hidden');
            document.getElementById('btn-leave').classList.add('hidden');
            
            // Cek apakah tadi masuk lewat QR atau normal
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('autoJoin') === '1') {
                document.getElementById('qr-landing-area').classList.remove('hidden');
                document.getElementById('subtitle').innerText = "Sistem Pemandu Audio Satu Arah";
            } else {
                document.getElementById('setup-area').classList.remove('hidden');
                document.getElementById('subtitle').innerText = "Sistem Pemandu Audio Satu Arah";
            }
        }

        // Deteksi Kedatangan Pengunjung via QR Code
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const room = urlParams.get('room');
            const autoJoin = urlParams.get('autoJoin');
            const role = urlParams.get('role');

            if (room) {
                document.getElementById('roomName').value = room;
                document.getElementById('landing-room-id').innerText = room;
            }
            
            // Jika pengunjung datang dari hasil scan QR Code, Tahan di Landing Page!
            if (autoJoin === '1' && role === 'listener') {
                document.getElementById('setup-area').classList.add('hidden');
                document.getElementById('qr-landing-area').classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
