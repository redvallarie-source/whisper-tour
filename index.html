<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper Tour - TCU Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.9.0/jsrsasign-all-min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Poppins:wght@400;600;700&display=swap');
        :root { --tcu-green: #007A53; --tcu-dark: #00563B; --tcu-light: #f0f7f4; --white: #ffffff; --error-red: #d93025; }
        body { font-family: 'Poppins', 'Noto Sans TC', sans-serif; background: #f4f7f6; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; position: relative; }
        .tcu-premium-header { position: absolute; top: 20px; left: 30px; display: flex; align-items: center; gap: 15px; }
        .tcu-logo { width: 70px; height: auto; mix-blend-mode: multiply; }
        .vertical-divider { width: 2px; height: 60px; background-color: var(--tcu-green); border-radius: 2px; }
        .tcu-title { color: var(--tcu-dark); margin: 0; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
        .nav-lang { width: 100%; display: flex; justify-content: flex-end; padding: 15px 25px; box-sizing: border-box; }
        .nav-lang select { padding: 8px 15px; border-radius: 20px; border: 1px solid var(--tcu-green); background: white; color: var(--tcu-green); font-weight: 600; cursor: pointer; outline: none; }
        .header { text-align: center; margin-top: 100px; margin-bottom: 30px; padding: 0 20px; }
        .header h1 { color: var(--tcu-dark); margin: 0; font-size: 28px; }
        .header p { color: #666; margin: 5px 0 0; font-size: 14px; }
        .main-grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; width: 100%; max-width: 850px; padding: 0 20px; box-sizing: border-box; }
        .role-card { background: white; flex: 1; min-width: 300px; padding: 35px 25px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; border: 2px solid transparent; }
        input { padding: 15px; width: 100%; box-sizing: border-box; border-radius: 12px; font-size: 16px; border: 2px solid #eee; text-align: center; margin-bottom: 10px; font-weight: bold; }
        .error-text { color: var(--error-red); font-size: 13px; font-weight: 500; margin-bottom: 15px; display: none; }
        button { padding: 15px; width: 100%; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; border: none; margin-bottom: 12px; }
        .btn-host { background: var(--tcu-green); color: white; }
        .btn-listener { background: #444; color: white; }
        .dashboard { width: 100%; max-width: 450px; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,122,83,0.1); text-align: center; margin-top: 50px; }
        .participant-badge { background: var(--tcu-light); color: var(--tcu-dark); padding: 8px 20px; border-radius: 20px; display: inline-block; font-weight: bold; margin-bottom: 20px; border: 1px solid rgba(0, 122, 83, 0.2); }
        #visualizer { width: 100%; height: 60px; background: #eee; border-radius: 10px; margin: 15px 0; overflow: hidden; display: flex; align-items: center; justify-content: center; gap: 3px; }
        .bar { width: 5px; background: var(--tcu-green); border-radius: 10px; }
        .qr-area { background: #f9f9f9; padding: 20px; border-radius: 20px; margin-top: 20px; border: 1px dashed #ccc; }
        #qrcode { display: flex; justify-content: center; margin-top: 15px; }
        .btn-danger { background: rgba(255, 75, 75, 0.1); color: var(--error-red); border: 2px solid rgba(255, 75, 75, 0.2); margin-top: 20px; width: 100%; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="tcu-premium-header">
        <img src="tcu-logo.png" class="tcu-logo" alt="TCU Logo">
        <div class="vertical-divider"></div>
        <h1 class="tcu-title">Tzu Chi University</h1>
    </div>
    <div class="nav-lang"><select id="langSelect" onchange="changeLanguage()"><option value="en">English</option><option value="id">Bahasa Indonesia</option><option value="zh">繁體中文</option></select></div>
    <div class="header"><h1 id="txt-title">Whisper Tour</h1><p id="txt-subtitle">Professional Guide System</p></div>

    <div class="main-grid" id="landing-page">
        <div class="role-card">
            <h2 id="txt-im-host">Host / Guide</h2>
            <input type="text" id="hostRoom" placeholder="Room ID" value="1234">
            <div id="host-error" class="error-text"></div>
            <button class="btn-host" onclick="joinRoom('host')" id="btn-host-action">🚀 Create Room</button>
        </div>
        <div class="role-card">
            <h2 id="txt-im-listener">Listener / Guest</h2>
            <input type="text" id="listenerRoom" placeholder="Room ID" value="">
            <div id="listener-error" class="error-text"></div>
            <button class="btn-listener" onclick="joinRoom('listener')" id="btn-listener-action">🎧 Join Room</button>
        </div>
    </div>

    <div id="active-dashboard" class="dashboard hidden">
        <h2 id="txt-active-room">Room Active</h2>
        <div class="participant-badge">👥 <span id="txt-part-label">Participants:</span> <span id="participant-count-value">1</span></div>
        <div id="host-controls" class="hidden">
            <div id="visualizer"></div>
            <div class="qr-area"><div id="qrcode"></div></div>
        </div>
        <div id="listener-controls" class="hidden"><p id="txt-connected" style="font-weight:bold;">Connected...</p></div>
        <button class="btn-danger" onclick="leaveRoom()" id="txt-end">End / Leave</button>
    </div>

    <script>
        const translations = {
            en: { title: "Whisper Tour", startBtn: "🚀 Create Room", joinBtn: "🎧 Join Room", end: "End / Leave", connError: "Connection Failed!" },
            id: { title: "Whisper Tour", startBtn: "🚀 Buat Ruangan", joinBtn: "🎧 Gabung Ruangan", end: "Akhiri / Keluar", connError: "Koneksi Gagal!" },
            zh: { title: "隨身導覽系統", startBtn: "🚀 建立房間", joinBtn: "🎧 加入房間", end: "結束 / 離開", connError: "連線失敗!" }
        };

        const LIVEKIT_URL = "wss://whisper-tour-app-yqygtof5.livekit.cloud";
        const API_KEY = "API5mBWCdaKNLLQ";
        const API_SECRET = "xfZhky6tUeDAYufb8ewdUZOy2vmaJXqOZpfDhpCybiGB";
        
        let currentRoom = null;

        function generateToken(roomName, isHost) {
            const payload = JSON.stringify({
                iss: API_KEY, 
                sub: isHost ? "host" : "listener",
                exp: Math.floor(Date.now() / 1000) + 7200, 
                video: { roomJoin: true, room: roomName, canPublish: isHost, canSubscribe: true }
            });
            return KJUR.jws.JWS.sign("HS256", JSON.stringify({alg: "HS256", typ: "JWT"}), payload, {utf8: API_SECRET});
        }

        async function joinRoom(role) {
            const isHost = role === 'host';
            const roomName = (isHost ? document.getElementById('hostRoom').value : document.getElementById('listenerRoom').value).trim();
            try {
                currentRoom = new LivekitClient.Room();
                const token = generateToken(roomName, isHost);
                await currentRoom.connect(LIVEKIT_URL, token);
                
                document.getElementById('landing-page').classList.add('hidden');
                document.getElementById('active-dashboard').classList.remove('hidden');
                
                if(isHost) {
                    document.getElementById('host-controls').classList.remove('hidden');
                    const link = window.location.origin + window.location.pathname + "?room=" + encodeURIComponent(roomName);
                    document.getElementById('qrcode').innerHTML = "";
                    new QRCode(document.getElementById("qrcode"), { text: link, width: 160, height: 160 });
                } else {
                    document.getElementById('listener-controls').classList.remove('hidden');
                    currentRoom.on('trackSubscribed', t => t.attach());
                }
            } catch(e) { 
                alert("Connection Failed!"); 
                leaveRoom();
            }
        }

        function leaveRoom() {
            if(currentRoom) currentRoom.disconnect();
            currentRoom = null;
            location.reload();
        }

        function changeLanguage() {}
    </script>
</body>
</html>
