<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper Tour - TCU Edition</title>
    
    <script>
        window.dependencyLoaders = [];
        function loadScriptFallback(url) {
            const promise = new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = url;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
            window.dependencyLoaders.push(promise);
            return promise;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js" onerror="loadScriptFallback('https://unpkg.com/livekit-client/dist/livekit-client.umd.min.js')"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.9.0/jsrsasign-all-min.js" onerror="loadScriptFallback('https://cdn.jsdelivr.net/npm/jsrsasign/lib/jsrsasign-all-min.js')"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" onerror="loadScriptFallback('https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js')"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Poppins:wght@400;600;700&display=swap');

        :root {
            --tcu-green: #007A53;
            --tcu-dark: #00563B;
            --tcu-light: #f0f7f4;
            --white: #ffffff;
            --error-red: #d93025;
            --ink: #1f2933;
            --muted: #647067;
            --line: #dfe8e3;
            --tcu-blue: #1f5d7a;
        }

        body { 
            font-family: 'Poppins', 'Noto Sans TC', sans-serif; 
            background: linear-gradient(180deg, #f7faf8 0%, #eef5f1 100%);
            margin: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            position: relative;
            color: var(--ink);
            overflow-x: hidden;
        }
        body::before {
            content: ""; position: fixed; inset: 0; pointer-events: none;
            background:
                linear-gradient(90deg, rgba(0,122,83,0.055) 1px, transparent 1px),
                linear-gradient(180deg, rgba(31,93,122,0.045) 1px, transparent 1px);
            background-size: 92px 92px;
            mask-image: linear-gradient(180deg, rgba(0,0,0,0.9), rgba(0,0,0,0.15));
        }

        .tcu-premium-header {
            position: absolute; top: 20px; left: 30px;
            display: flex; align-items: center; gap: 15px;
        }
        .tcu-logo { width: 70px; height: auto; mix-blend-mode: multiply; }
        .tcu-logo-fallback {
            width: 70px; height: 52px; display: none; align-items: center; justify-content: center;
            border: 1px solid var(--line); border-radius: 8px; color: var(--tcu-dark);
            background: white; font-weight: 700; letter-spacing: 0;
        }
        .vertical-divider { width: 2px; height: 60px; background-color: var(--tcu-green); border-radius: 2px; }
        .tcu-title { color: var(--tcu-dark); margin: 0; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }

        .nav-lang { width: 100%; display: flex; justify-content: flex-end; padding: 18px 28px; box-sizing: border-box; }
        .nav-lang select {
            padding: 9px 14px; border-radius: 8px; border: 1px solid var(--line);
            background: white; color: var(--tcu-dark); font-weight: 600; cursor: pointer; outline: none;
            box-shadow: 0 6px 16px rgba(0, 86, 59, 0.06);
        }

        .header { text-align: center; margin-top: 100px; margin-bottom: 28px; padding: 0 20px; }
        .header h1 { color: var(--tcu-dark); margin: 0; font-size: 32px; font-weight: 700; }
        .header p { color: var(--muted); margin: 6px 0 0; font-size: 14px; }

        .main-grid {
            display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; width: 100%; max-width: 850px; padding: 0 20px; box-sizing: border-box;
            position: relative;
        }
        .main-grid::before {
            content: ""; position: absolute; inset: -18px 8px 18px;
            border: 1px solid rgba(0, 122, 83, 0.16); border-radius: 8px;
            background:
                linear-gradient(90deg, transparent 49.8%, rgba(31,93,122,0.1) 50%, transparent 50.2%),
                linear-gradient(180deg, rgba(0,122,83,0.08), transparent 18%, transparent 82%, rgba(0,122,83,0.08));
            pointer-events: none;
        }
        
        .role-card {
            background: white; flex: 1; min-width: 300px; padding: 35px 25px;
            border-radius: 8px; box-shadow: 0 14px 35px rgba(0, 86, 59, 0.08);
            text-align: center; transition: transform 0.2s ease, border-color 0.2s ease;
            border: 1px solid var(--line);
            position: relative; overflow: hidden; z-index: 1;
        }
        .role-card::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; height: 5px;
            background: linear-gradient(90deg, var(--tcu-green), var(--tcu-blue));
        }
        .role-card::after {
            content: ""; position: absolute; right: 18px; bottom: 18px; width: 42px; height: 42px;
            border-right: 2px solid rgba(0, 122, 83, 0.22);
            border-bottom: 2px solid rgba(31, 93, 122, 0.2);
        }
        .role-card:hover { transform: translateY(-3px); border-color: rgba(0, 122, 83, 0.35); }
        .role-card h2 { color: var(--tcu-dark); margin-top: 0; }
        .role-card p { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
        
        input { 
            padding: 14px; width: 100%; box-sizing: border-box; border-radius: 8px; 
            font-size: 16px; border: 1px solid var(--line); text-align: center; 
            margin-bottom: 10px; font-weight: bold; font-family: 'Poppins', sans-serif;
            background: #fbfdfc;
        }
        input:focus { outline: none; border-color: var(--tcu-green); }

        .error-text { color: var(--error-red); font-size: 13px; font-weight: 500; margin-bottom: 15px; min-height: 20px; display: none; }

        button { 
            padding: 14px; width: 100%; border-radius: 8px; font-size: 16px; 
            font-weight: 700; cursor: pointer; border: none; transition: 0.2s;
            font-family: 'Poppins', sans-serif;
        }
        .btn-host { background: var(--tcu-green); color: white; }
        .btn-listener { background: #444; color: white; }
        button:hover { opacity: 0.9; transform: scale(1.02); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .dashboard {
            width: 100%; max-width: 450px; background: white; padding: 40px;
            border-radius: 8px; box-shadow: 0 20px 45px rgba(0,122,83,0.1);
            text-align: center; margin-top: 50px; border: 1px solid var(--line);
            position: relative; overflow: hidden;
        }
        .dashboard::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; height: 5px;
            background: linear-gradient(90deg, var(--tcu-green), var(--tcu-blue));
        }

        .participant-badge {
            background: var(--tcu-light); color: var(--tcu-dark); padding: 8px 20px;
            border-radius: 20px; display: inline-block; font-weight: bold; margin-bottom: 20px;
            border: 1px solid rgba(0, 122, 83, 0.2);
        }

        #visualizer { width: 100%; height: 60px; background: #eef3f0; border-radius: 8px; margin: 15px 0; overflow: hidden; display: flex; align-items: center; justify-content: center; gap: 3px; }
        .bar { width: 5px; background: var(--tcu-green); border-radius: 10px; transition: height 0.1s; }

        .qr-area { background: #fbfdfc; padding: 20px; border-radius: 8px; margin-top: 20px; border: 1px dashed #b9cbc2; }
        #qrcode { display: flex; justify-content: center; margin-top: 15px; }
        #qrcode img, #qrcode canvas { width: 160px; height: 160px; }
        .qr-link { display: block; margin-top: 12px; color: var(--tcu-dark); font-size: 12px; overflow-wrap: anywhere; text-decoration: none; }
        .qr-warning { display: none; color: var(--error-red); font-size: 12px; margin: 10px 0 0; }
        .btn-audio { background: var(--tcu-green); color: white; margin-top: 12px; display: none; }

        .btn-mute { background: #f4b400; color: white; margin-bottom: 10px; }
        .btn-danger { background: #ea4335; color: white; margin-top: 20px; }

        .hidden { display: none !important; }
        .pulse { animation: pulse-green 2s infinite; }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(0,122,83,0.4); } 70% { box-shadow: 0 0 0 20px rgba(0,122,83,0); } 100% { box-shadow: 0 0 0 0 rgba(0,122,83,0); } }
        
        @media (max-width: 600px) {
            .tcu-premium-header { top: 18px; left: 20px; gap: 9px; max-width: calc(100% - 190px); }
            .tcu-logo { width: 54px; }
            .tcu-logo-fallback { width: 54px; height: 46px; font-size: 13px; }
            .vertical-divider { height: 50px; }
            .tcu-title { display: block; font-size: 14px; line-height: 1.15; max-width: 92px; letter-spacing: 0; }
            .nav-lang { padding: 22px 20px 0 0; }
            .nav-lang select { width: 150px; }
            .header { margin-top: 150px; }
            .main-grid { padding: 0 28px 32px; }
            .main-grid::before { inset: -14px 16px 18px; }
        }
    </style>
</head>
<body>

    <div class="tcu-premium-header">
        <img src="tcu-logo.png" class="tcu-logo" alt="TCU Logo" onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='flex';">
        <div id="logoFallback" class="tcu-logo-fallback">TCU</div>
        <div class="vertical-divider"></div>
        <h1 class="tcu-title">Tzu Chi University</h1>
    </div>

    <div class="nav-lang">
        <select id="langSelect" onchange="changeLanguage()">
            <option value="en">English</option>
            <option value="id">Bahasa Indonesia</option>
            <option value="zh">繁體中文</option>
        </select>
    </div>

    <div class="header">
        <h1 id="txt-title">Whisper Tour</h1>
        <p id="txt-subtitle">Professional Guide System</p>
    </div>

    <div class="main-grid" id="landing-page">
        <div class="role-card">
            <h2 id="txt-im-host">Host / Guide</h2>
            <p id="txt-host-desc">Create a room and start broadcasting.</p>
            <input type="text" id="hostRoom" placeholder="Room ID (e.g. 1234)" value="1234">
            <div id="host-error" class="error-text"></div>
            <button class="btn-host" onclick="joinRoom('host')" id="btn-host-action">Create Room</button>
        </div>

        <div class="role-card">
            <h2 id="txt-im-listener">Listener / Guest</h2>
            <p id="txt-listener-desc">Enter an active room ID to listen.</p>
            <input type="text" id="listenerRoom" placeholder="Room ID" value="">
            <div id="listener-error" class="error-text"></div>
            <button class="btn-listener" onclick="joinRoom('listener')" id="btn-listener-action">Join Room</button>
        </div>
    </div>

    <div id="active-dashboard" class="dashboard hidden">
        <h2 id="txt-active-room">Room Active</h2>
        
        <div class="participant-badge">
            👥 <span id="txt-part-label">Participants:</span> <span id="participant-count-value">1</span>
        </div>
        
        <div id="host-controls" class="hidden">
            <p id="txt-mic-status" style="margin:0; font-size:14px; font-weight:bold; color:#666;">Microphone Activity:</p>
            <div id="visualizer"></div>
            <button id="btnMute" class="btn-mute" onclick="toggleMute()">🔇 Mute</button>
            <div class="qr-area">
                <p id="txt-scan-desc" style="margin:0; font-size:14px; font-weight:bold; color:var(--tcu-dark);">Share this QR with guests:</p>
                <div id="qrcode"></div>
                <a id="qr-link" class="qr-link" href="#" target="_blank" rel="noopener"></a>
                <p id="qr-warning" class="qr-warning"></p>
            </div>
        </div>

        <div id="listener-controls" class="hidden">
            <div id="listener-pulse" class="listening-animation pulse" style="width:80px; height:80px; background:var(--tcu-green); border-radius:50%; margin:20px auto; display:flex; align-items:center; justify-content:center; color:white; font-size:30px;">🔊</div>
            <p id="txt-connected" style="font-weight: bold; margin-top: 20px;">Connected. Hearing the guide...</p>
            <button id="btnEnableAudio" class="btn-audio" onclick="enableListenerAudio()">Enable Audio</button>
            <div id="remote-audio-container" aria-hidden="true"></div>
        </div>

        <button class="btn-danger" onclick="leaveRoom()" id="txt-end">End / Leave</button>
    </div>

    <script>
        const translations = {
            en: {
                title: "Whisper Tour", subtitle: "Professional Guide System", imHost: "Host / Guide", imListener: "Listener / Guest",
                hostDesc: "Create a room and start broadcasting.", listenerDesc: "Enter an active room ID to listen.",
                startBtn: "Create Room", joinBtn: "Join Room", active: "Room Active", micStatus: "Microphone Activity:",
                mute: "Mute", unmute: "Unmute", scan: "Share this QR with guests:", connected: "Connected. Hearing the guide...", end: "End / Leave",
                emptyId: "⚠️ Please enter a Room ID!", connecting: "⏳ Connecting...", micError: "⚠️ Microphone blocked by browser!", 
                connError: "⚠️ Connection Failed. Check internet.", partLabel: "Participants:",
                waitingHost: "⏳ Room is empty. Waiting for Guide to join...",
                inactiveRoom: "⚠️ Room is not active yet. Please wait for the guide to create it."
            },
            id: {
                title: "Whisper Tour", subtitle: "Sistem Pemandu Profesional", imHost: "Host / Pemandu", imListener: "Pendengar / Tamu",
                hostDesc: "Buat ruangan dan siarkan suaramu.", listenerDesc: "Masukkan ID ruangan aktif untuk mendengar.",
                startBtn: "Buat Ruangan", joinBtn: "Gabung Ruangan", active: "Ruangan Aktif", micStatus: "Aktivitas Mikrofon:",
                mute: "Bisu", unmute: "Nyalakan Suara", scan: "Bagikan QR ini ke tamu:", connected: "Terhubung. Mendengarkan pemandu...", end: "Akhiri / Keluar",
                emptyId: "⚠️ Masukkan ID Ruangan dulu!", connecting: "⏳ Menghubungkan...", micError: "⚠️ Izin mikrofon ditolak browser!", 
                connError: "⚠️ Koneksi Gagal. Cek internet.", partLabel: "Peserta:",
                waitingHost: "⏳ Ruangan kosong. Menunggu Pemandu masuk...",
                inactiveRoom: "⚠️ Ruangan belum aktif. Tunggu pemandu membuat ruangan dulu."
            },
            zh: {
                title: "隨身導覽系統", subtitle: "專業語音導覽", imHost: "導覽員 / 主持人", imListener: "聽眾 / 遊客",
                hostDesc: "建立房間並開始廣播。", listenerDesc: "輸入正在使用的房間 ID 開始收聽。",
                startBtn: "建立房間", joinBtn: "加入房間", active: "房間使用中", micStatus: "麥克風活動：",
                mute: "靜音", unmute: "解除靜音", scan: "分享二維碼給遊客：", connected: "已連線。正在收聽導覽...", end: "結束 / 離開",
                emptyId: "⚠️ 請輸入房間 ID！", connecting: "⏳ 連線中...", micError: "⚠️ 瀏覽器拒絕了麥克風權限！", 
                connError: "⚠️ 連線失敗，請檢查網路。", partLabel: "參與人數:",
                waitingHost: "⏳ 房間是空的。等待導覽員加入...",
                inactiveRoom: "⚠️ 房間尚未啟用，請等待導覽員建立房間。"
            }
        };

        const LIVEKIT_URL = "wss://whisper-tour-app-yqygtof5.livekit.cloud";
        const API_KEY = "API5mBWCdaKNLLQ";
        const API_SECRET = "xfZhky6tUeDAYufb8ewdUZOy2vmaJXqOZpfDhpCybiGB";
        
        let currentRoom = null;
        let audioCtx = null;
        let isMutedGlobal = false;
        let radarInterval = null;
        let visualizerStream = null;
        const attachedAudioTracks = new Map();

        function changeLanguage() {
            const lang = document.getElementById('langSelect').value;
            const t = translations[lang];
            document.getElementById('txt-title').innerText = t.title;
            document.getElementById('txt-subtitle').innerText = t.subtitle;
            document.getElementById('txt-im-host').innerText = t.imHost;
            document.getElementById('txt-im-listener').innerText = t.imListener;
            document.getElementById('txt-host-desc').innerText = t.hostDesc;
            document.getElementById('txt-listener-desc').innerText = t.listenerDesc;
            document.getElementById('txt-active-room').innerText = t.active;
            document.getElementById('txt-mic-status').innerText = t.micStatus;
            document.getElementById('txt-scan-desc').innerText = t.scan;
            document.getElementById('txt-end').innerText = t.end;
            document.getElementById('txt-part-label').innerText = t.partLabel;
            
            document.getElementById('btn-host-action').innerText = t.startBtn;
            document.getElementById('btn-listener-action').innerText = t.joinBtn;
            if(currentRoom) {
                document.getElementById('btnMute').innerText = isMutedGlobal ? t.unmute : t.mute;
                checkHostStatus();
            }
        }

        function generateToken(roomName, isHost) {
            const header = JSON.stringify({ alg: "HS256", typ: "JWT" });
            const now = Math.floor(Date.now() / 1000);
            const payload = JSON.stringify({
                iss: API_KEY, 
                sub: isHost ? "host-" + Math.floor(Math.random()*10000) : "listener-" + Math.floor(Math.random()*10000),
                nbf: now - 300, 
                exp: now + 7200, 
                video: { roomJoin: true, room: roomName, canPublish: isHost, canSubscribe: true }
            });
            return KJUR.jws.JWS.sign("HS256", header, payload, {utf8: API_SECRET});
        }

        function getRemoteParticipants() {
            if (!currentRoom) return new Map();
            return currentRoom.remoteParticipants || currentRoom.participants || new Map();
        }

        function hasRemoteHost() {
            let foundHost = false;
            getRemoteParticipants().forEach((participant) => {
                if (participant.identity && participant.identity.startsWith('host-')) {
                    foundHost = true;
                }
            });
            return foundHost;
        }

        async function waitForRemoteHost(timeoutMs = 2500) {
            const startTime = Date.now();
            while (Date.now() - startTime < timeoutMs) {
                if (hasRemoteHost()) return true;
                await new Promise(resolve => setTimeout(resolve, 250));
            }
            return hasRemoteHost();
        }

        function updateParticipantCount() {
            if (!currentRoom) return;
            const totalCount = getRemoteParticipants().size + 1;
            document.getElementById('participant-count-value').innerText = totalCount;
        }

        function showInlineError(role, message, duration = 4000) {
            const errorDiv = role === 'host' ? document.getElementById('host-error') : document.getElementById('listener-error');
            errorDiv.innerText = message;
            errorDiv.style.display = 'block';
            setTimeout(() => { errorDiv.style.display = 'none'; }, duration);
        }

        async function ensureDependencies(isHost) {
            if (window.dependencyLoaders && window.dependencyLoaders.length) {
                await Promise.allSettled(window.dependencyLoaders);
            }

            const missing = [];
            if (typeof LivekitClient === 'undefined') missing.push('LiveKit');
            if (typeof KJUR === 'undefined') missing.push('token library');
            if (isHost && (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia)) missing.push('microphone access');

            if (missing.length) {
                const err = new Error('Missing dependencies: ' + missing.join(', '));
                err.userMessage = 'Needed files failed to load: ' + missing.join(', ') + '. Check internet/CDN access, then refresh.';
                throw err;
            }
        }

        function checkHostStatus() {
            if(!currentRoom || document.getElementById('host-controls').classList.contains('hidden') === false) return;
            
            const statusText = document.getElementById('txt-connected');
            const lang = document.getElementById('langSelect').value;
            
            if(!hasRemoteHost()) {
                statusText.innerText = translations[lang].waitingHost;
                statusText.style.color = "#d93025"; 
            } else {
                statusText.innerText = translations[lang].connected;
                statusText.style.color = "#007A53"; 
            }
        }

        function buildListenerLink(roomName) {
            const url = new URL(window.location.href);
            url.searchParams.set('room', roomName);
            url.searchParams.set('role', 'listener');
            url.searchParams.set('autoJoin', '1');
            return url.toString();
        }

        function renderQRCode(roomName) {
            const listenerLink = buildListenerLink(roomName);
            const qrBox = document.getElementById('qrcode');
            const qrLink = document.getElementById('qr-link');
            const qrWarning = document.getElementById('qr-warning');

            qrBox.innerHTML = "";
            qrLink.href = listenerLink;
            qrLink.innerText = listenerLink;
            qrWarning.style.display = 'none';
            qrWarning.innerText = "";

            try {
                if (typeof QRCode === 'function') {
                    new QRCode(qrBox, { text: listenerLink, width: 160, height: 160 });
                    return;
                }
                throw new Error('QRCode library is not available');
            } catch (qrErr) {
                const img = document.createElement('img');
                img.alt = 'Listener QR code';
                img.width = 160;
                img.height = 160;
                img.src = "https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=" + encodeURIComponent(listenerLink);
                img.onerror = () => {
                    qrWarning.innerText = "QR failed to load. Share the link below.";
                    qrWarning.style.display = 'block';
                    qrBox.innerHTML = "";
                };
                qrBox.appendChild(img);
            }

            if (window.location.protocol === 'file:') {
                qrWarning.innerText = "For phones, open this page from a shared URL or local server. file:// links only work on this computer.";
                qrWarning.style.display = 'block';
            }
        }

        function getAudioTrackKey(track, publication, participant) {
            return [
                participant && participant.identity ? participant.identity : 'participant',
                publication && publication.trackSid ? publication.trackSid : '',
                track && track.sid ? track.sid : ''
            ].filter(Boolean).join('-');
        }

        function attachAudioTrack(track, publication, participant) {
            if (!track || track.kind !== 'audio') return;

            const key = getAudioTrackKey(track, publication, participant);
            if (attachedAudioTracks.has(key)) return;

            const audioContainer = document.getElementById('remote-audio-container');
            const audioElement = track.attach();
            audioElement.autoplay = true;
            audioElement.playsInline = true;
            audioElement.controls = false;
            audioElement.dataset.trackKey = key;
            audioContainer.appendChild(audioElement);
            attachedAudioTracks.set(key, { track, audioElement });

            let playPromise = null;
            try {
                playPromise = audioElement.play();
            } catch (playErr) {
                document.getElementById('btnEnableAudio').style.display = 'block';
            }
            if (playPromise && typeof playPromise.catch === 'function') {
                playPromise.catch(() => {
                    document.getElementById('btnEnableAudio').style.display = 'block';
                });
            }
        }

        function detachAudioTrack(track, publication, participant) {
            const key = getAudioTrackKey(track, publication, participant);
            const attached = attachedAudioTracks.get(key);
            if (!attached) return;

            try {
                if (attached.track && attached.audioElement) {
                    attached.track.detach(attached.audioElement);
                }
            } catch (detachErr) {
                // The element can already be detached when a participant leaves quickly.
            }
            attached.audioElement.remove();
            attachedAudioTracks.delete(key);
        }

        function attachExistingAudioTracks() {
            getRemoteParticipants().forEach((participant) => {
                const publications = participant.trackPublications || participant.audioTrackPublications || new Map();
                publications.forEach((publication) => {
                    if (publication.kind === 'audio' && publication.track) {
                        attachAudioTrack(publication.track, publication, participant);
                    }
                });
            });
        }

        function onRoomEvent(room, eventName, handler) {
            if (eventName) room.on(eventName, handler);
        }

        function leaveIfHostIsMissing() {
            setTimeout(() => {
                const listenerVisible = !document.getElementById('listener-controls').classList.contains('hidden');
                if (currentRoom && listenerVisible && !hasRemoteHost()) {
                    const lang = document.getElementById('langSelect').value;
                    leaveRoom();
                    showInlineError('listener', translations[lang].inactiveRoom, 6000);
                }
            }, 1200);
        }

        function registerRoomEvents(room, isHost) {
            onRoomEvent(room, LivekitClient.RoomEvent.ParticipantConnected, () => { updateParticipantCount(); checkHostStatus(); });
            onRoomEvent(room, LivekitClient.RoomEvent.ParticipantDisconnected, () => {
                updateParticipantCount();
                checkHostStatus();
                if (!isHost) leaveIfHostIsMissing();
            });
            onRoomEvent(room, LivekitClient.RoomEvent.Connected, () => { updateParticipantCount(); checkHostStatus(); });
            onRoomEvent(room, LivekitClient.RoomEvent.Reconnected, () => { updateParticipantCount(); checkHostStatus(); attachExistingAudioTracks(); });
            onRoomEvent(room, LivekitClient.RoomEvent.Disconnected, () => { clearInterval(radarInterval); radarInterval = null; });

            if (!isHost) {
                onRoomEvent(room, LivekitClient.RoomEvent.TrackSubscribed, (track, publication, participant) => {
                    attachAudioTrack(track, publication, participant);
                    checkHostStatus();
                });
                onRoomEvent(room, LivekitClient.RoomEvent.TrackUnsubscribed, (track, publication, participant) => {
                    detachAudioTrack(track, publication, participant);
                    checkHostStatus();
                });
            }
        }

        async function enableListenerAudio() {
            const button = document.getElementById('btnEnableAudio');
            const elements = document.querySelectorAll('#remote-audio-container audio');
            for (const element of elements) {
                try { await element.play(); } catch (e) {}
            }
            button.style.display = 'none';
        }

        async function joinRoom(role) {
            const isHost = role === 'host';
            const roomInput = isHost ? document.getElementById('hostRoom') : document.getElementById('listenerRoom');
            const roomName = roomInput.value.trim(); 
            const lang = document.getElementById('langSelect').value;
            
            if (!roomName) { showInlineError(role, translations[lang].emptyId); return; }

            const btn = isHost ? document.getElementById('btn-host-action') : document.getElementById('btn-listener-action');
            const originalText = btn.innerText;
            btn.innerText = translations[lang].connecting;
            btn.disabled = true;

            try {
                await ensureDependencies(isHost);
                const token = generateToken(roomName, isHost);
                currentRoom = new LivekitClient.Room();
                registerRoomEvents(currentRoom, isHost);
                await currentRoom.connect(LIVEKIT_URL, token, { autoSubscribe: true });

                if (!isHost && !(await waitForRemoteHost())) {
                    const inactiveError = new Error('Room has no active host');
                    inactiveError.userMessage = translations[lang].inactiveRoom;
                    throw inactiveError;
                }

                document.getElementById('landing-page').classList.add('hidden');
                document.getElementById('active-dashboard').classList.remove('hidden');

                updateParticipantCount();

                radarInterval = setInterval(() => {
                    if(currentRoom) {
                        updateParticipantCount();
                        checkHostStatus();
                    }
                }, 2000);

                if (isHost) {
                    try {
                        document.getElementById('host-controls').classList.remove('hidden');
                        await currentRoom.localParticipant.setMicrophoneEnabled(true);
                        isMutedGlobal = false;
                        startVisualizer();
                        renderQRCode(roomName);
                        
                    } catch (micErr) {
                        leaveRoom();
                        showInlineError('host', translations[lang].micError);
                    }
                } else {
                    document.getElementById('listener-controls').classList.remove('hidden');
                    attachExistingAudioTracks();
                    checkHostStatus(); 
                }
            } catch (e) {
                console.error("Error Detail:", e);
                if (currentRoom) {
                    try { currentRoom.disconnect(); } catch (disconnectErr) {}
                    currentRoom = null;
                }
                if (radarInterval) { clearInterval(radarInterval); radarInterval = null; }
                showInlineError(role, e.userMessage || translations[lang].connError, e.userMessage ? 8000 : 4000);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        function startVisualizer() {
            const container = document.getElementById('visualizer');
            container.innerHTML = "";
            const bars = [];
            for (let i = 0; i < 20; i++) {
                const bar = document.createElement('div');
                bar.className = 'bar'; bar.style.height = '10px';
                container.appendChild(bar); bars.push(bar);
            }

            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                visualizerStream = stream;
                audioCtx = new AudioContext();
                const source = audioCtx.createMediaStreamSource(stream);
                const analyser = audioCtx.createAnalyser();
                analyser.fftSize = 64; source.connect(analyser);
                const dataArray = new Uint8Array(analyser.frequencyBinCount);

                function draw() {
                    if (!currentRoom || !audioCtx) return;
                    requestAnimationFrame(draw);
                    analyser.getByteFrequencyData(dataArray);
                    bars.forEach((bar, i) => {
                        const val = isMutedGlobal ? 0 : (dataArray[i] || 0);
                        bar.style.height = (val / 2) + 5 + 'px';
                    });
                }
                draw();
            }).catch(e => console.log("Visualizer Mic Error"));
        }

        async function toggleMute() {
            if (!currentRoom) return;
            isMutedGlobal = !isMutedGlobal;
            await currentRoom.localParticipant.setMicrophoneEnabled(!isMutedGlobal);
            const lang = document.getElementById('langSelect').value;
            document.getElementById('btnMute').innerText = isMutedGlobal ? translations[lang].unmute : translations[lang].mute;
            document.getElementById('btnMute').style.background = isMutedGlobal ? "#ea4335" : "#f4b400";
        }

        function leaveRoom() {
            if (currentRoom) { currentRoom.disconnect(); currentRoom = null; }
            if (audioCtx) { audioCtx.close(); audioCtx = null; }
            if (visualizerStream) {
                visualizerStream.getTracks().forEach(track => track.stop());
                visualizerStream = null;
            }
            if (radarInterval) { clearInterval(radarInterval); radarInterval = null; }
            attachedAudioTracks.forEach(({ audioElement }) => audioElement.remove());
            attachedAudioTracks.clear();
            
            document.getElementById('active-dashboard').classList.add('hidden');
            document.getElementById('host-controls').classList.add('hidden');
            document.getElementById('listener-controls').classList.add('hidden');
            document.getElementById('btnEnableAudio').style.display = 'none';
            document.getElementById('qrcode').innerHTML = "";
            document.getElementById('qr-link').innerText = "";
            document.getElementById('qr-warning').style.display = 'none';
            document.getElementById('landing-page').classList.remove('hidden');
            
            const lang = document.getElementById('langSelect').value;
            document.getElementById('btn-host-action').innerText = translations[lang].startBtn;
            document.getElementById('btn-listener-action').innerText = translations[lang].joinBtn;
        }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('room')) {
                document.getElementById('listenerRoom').value = urlParams.get('room');
            }
            changeLanguage();
            if (urlParams.get('autoJoin') === '1' && urlParams.get('role') === 'listener') {
                joinRoom('listener');
            }
        };
    </script>
</body>
</html>
