<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper Tour - Live</title>
    
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.9.0/jsrsasign-all-min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input, button { padding: 12px; margin-top: 10px; width: 100%; box-sizing: border-box; border-radius: 8px; font-size: 16px; }
        input { border: 1px solid #ccc; text-align: center; font-weight: bold;}
        button { cursor: pointer; border: none; font-weight: bold; }
        .btn-host { background-color: #0056b3; color: white; }
        .btn-listener { background-color: #28a745; color: white; }
        .hidden { display: none; }
        #status { margin-top: 20px; font-weight: bold; color: #666; line-height: 1.5; }
        #qrcode { margin-top: 20px; display: flex; justify-content: center; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎙️ Whisper Tour</h1>
        
        <div id="setup-area">
            <p>Masukkan Nomor Ruangan Tour:</p>
            <input type="text" id="roomName" placeholder="Contoh: 1234" value="1234">

            <div id="controls">
                <button class="btn-host" onclick="joinRoom('host')">Masuk sebagai Pemandu</button>
                <br><br>
                <button class="btn-listener" onclick="joinRoom('listener')">Mulai Mendengarkan</button>
            </div>
        </div>

        <div id="status">Pilih peranmu untuk memulai...</div>
        <div id="qrcode"></div>
    </div>

    <script>
        const LIVEKIT_URL = "wss://whisper-tour-app-yqygtof5.livekit.cloud";
        const API_KEY = "API5mBWCdaKNLLQ";
        const API_SECRET = "xfZhky6tUeDAYufb8ewdUZOy2vmaJXqOZpfDhpCybiGB";

        function generateToken(roomName, isHost) {
            const header = JSON.stringify({ alg: "HS256", typ: "JWT" });
            const payload = JSON.stringify({
                iss: API_KEY,
                sub: isHost ? "pemandu-" + Math.floor(Math.random() * 1000) : "pengunjung-" + Math.floor(Math.random() * 1000),
                nbf: Math.floor(Date.now() / 1000),
                exp: Math.floor(Date.now() / 1000) + (3600 * 2), 
                video: {
                    roomJoin: true,
                    room: roomName,
                    canPublish: isHost, 
                    canSubscribe: true  
                }
            });
            return KJUR.jws.JWS.sign("HS256", header, payload, {utf8: API_SECRET});
        }

        async function joinRoom(role) {
            const roomName = document.getElementById('roomName').value;
            if (!roomName) return alert("Nomor ruangan tidak boleh kosong!");

            const isHost = role === 'host';
            const statusText = document.getElementById('status');
            
            statusText.innerText = "⏳ Sedang menyambungkan...";
            statusText.style.color = "orange";
            document.getElementById('setup-area').classList.add('hidden'); // Sembunyikan area ketik

            try {
                const token = generateToken(roomName, isHost);
                const room = new LivekitClient.Room();

                await room.connect(LIVEKIT_URL, token);

                if (isHost) {
                    statusText.innerHTML = "✅ <b>Kamu sedang LIVE!</b><br>Minta pengunjung scan QR Code di bawah ini untuk mendengarkan:";
                    statusText.style.color = "blue";
                    await room.localParticipant.setMicrophoneEnabled(true);

                    // --- FITUR BARU: Membuat Link dan QR Code ---
                    // 1. Merakit link dengan instruksi Auto-Join
                    const listenerLink = window.location.origin + window.location.pathname + "?room=" + roomName + "&role=listener&autoJoin=1";
                    
                    // 2. Menggambar QR Code
                    document.getElementById('qrcode').innerHTML = ""; 
                    new QRCode(document.getElementById("qrcode"), {
                        text: listenerLink,
                        width: 200,
                        height: 200
                    });

                } else {
                    statusText.innerHTML = "🎧 <b>Berhasil masuk.</b><br>Selamat mendengarkan penjelasan dari Pemandu!";
                    statusText.style.color = "green";
                    
                    room.on('trackSubscribed', (track) => {
                        if (track.kind === 'audio') {
                            const audioElement = track.attach();
                            document.body.appendChild(audioElement);
                        }
                    });
                }
            } catch (error) {
                console.error("Detail Error:", error);
                statusText.innerText = "❌ Gagal terhubung ke ruangan!";
                statusText.style.color = "red";
                document.getElementById('setup-area').classList.remove('hidden');
            }
        }

        // --- FITUR BARU: Deteksi Pintu Otomatis (Auto-Join) ---
        window.onload = () => {
            // Membaca link URL saat halaman dibuka
            const urlParams = new URLSearchParams(window.location.search);
            const autoJoin = urlParams.get('autoJoin');
            const role = urlParams.get('role');
            const room = urlParams.get('room');

            if (room) {
                document.getElementById('roomName').value = room; // Isi kotak angka otomatis
            }

            // Jika di link ada tulisan autoJoin=1 dan perannya listener, langsung terobos masuk!
            if (autoJoin === '1' && role === 'listener') {
                joinRoom('listener');
            }
        };
    </script>
</body>
</html>
